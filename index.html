<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Architect — Legal</title>
<style>
  :root {
    --bg: #0a0a1a;
    --panel: rgba(255, 255, 255, 0.06);
    --text: #e8e8f0;
    --muted: #8888a0;
    --accent: #b8a3ff;
    --link: #a896ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 520px;
    width: 100%;
    background: var(--panel);
    border-radius: 24px;
    padding: 40px 28px;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }
  .logo {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 28px;
    font-weight: 700;
  }
  .subtitle {
    color: var(--muted);
    margin: 0 0 32px;
    font-size: 14px;
  }
  .group { margin-bottom: 24px; }
  .group-title {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  a.doc {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 12px;
    color: var(--text);
    text-decoration: none;
    margin-bottom: 8px;
    transition: background 0.15s;
  }
  a.doc:hover {
    background: rgba(184, 163, 255, 0.10);
    color: var(--link);
  }
  a.doc .arrow { color: var(--muted); }
  .footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }
  .footer a { color: var(--link); text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Sleep Architect</div>
  <h1>Legal</h1>
  <p class="subtitle">Privacy Policy and Terms of Use for the Sleep Architect iOS app.</p>

  <div class="group">
    <div class="group-title">English</div>
    <a class="doc" href="privacy-policy-en.html"><span>Privacy Policy</span><span class="arrow">›</span></a>
    <a class="doc" href="terms-of-use-en.html"><span>Terms of Use</span><span class="arrow">›</span></a>
  </div>

  <div class="group">
    <div class="group-title">Русский</div>
    <a class="doc" href="privacy-policy-ru.html"><span>Политика конфиденциальности</span><span class="arrow">›</span></a>
    <a class="doc" href="terms-of-use-ru.html"><span>Условия использования</span><span class="arrow">›</span></a>
  </div>

  <div class="footer">
    Contact: <a href="mailto:zzcredi@gmail.com">zzcredi@gmail.com</a>
  </div>
</div>
</body>
</html>
